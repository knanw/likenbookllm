version: '3.9'

services:
  backend:
    build:
      context: ./backend
    container_name: notebook-lite-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-4o-mini

  frontend:
    build:
      context: ./frontend
    container_name: notebook-lite-frontend
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8000
    depends_on:
      - backend
